    <script>
        // Logique UI
        let isDark = false, isDys = false, baseFS = 16, isMuted = false, sRate = 1.1;

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark-mode', isDark);
            document.getElementById('btn-theme').innerHTML = isDark ? '<i class="fas fa-sun text-[#D9A526]"></i>' : '<i class="fas fa-moon"></i>';
        }

        function toggleDyslexia() {
            isDys = !isDys;
            document.body.classList.toggle('dyslexia-mode', isDys);
            document.getElementById('btn-dys').classList.toggle('active', isDys);
        }

        function changeFontSize(d) {
            baseFS = Math.min(22, Math.max(12, baseFS + d*2));
            document.documentElement.style.setProperty('--font-size-base', baseFS + 'px');
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('btn-mute').innerHTML = isMuted ? '<i class="fas fa-volume-mute text-[#E81123]"></i>' : '<i class="fas fa-volume-up text-[#D9A526]"></i>';
            if (isMuted) window.speechSynthesis.cancel();
        }

        function changeSpeechRate(a) {
            sRate = Math.min(2.0, Math.max(0.5, sRate + a));
            document.getElementById('ui-rate').innerText = "x" + sRate.toFixed(1);
        }

        window.lireTexte = function(t, d, e) {
            if (isMuted) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(`${t}. Définition : ${d}. Exemple : ${e}`);
            msg.lang = 'fr-FR';
            msg.rate = sRate;
            window.speechSynthesis.speak(msg);
        };

        // --- BASE DE DONNÉES : 105 CONCEPTS MODULE 002 ---

            { term: "Alignement stratégique", emoji: "🎯", def: "Cohérence entre les objectifs de la formation et la vision à long terme de l'entreprise.", example: "Former à l'IA parce que l'entreprise veut devenir leader numérique sous 2 ans." },

            { term: "Analyse systémique", emoji: "🕸️", def: "Considérer la formation comme un élément d'un tout (management, outils, culture).", example: "Vérifier si le problème vient du manque de savoir ou d'un logiciel obsolète." },
            { term: "Appel à projets", emoji: "💡", def: "Sollicitation orientée vers l'innovation et la créativité du prestataire.", example: "Demander des idées originales pour animer un séminaire de cohésion." },
            { term: "Appel d'offres", emoji: "📜", def: "Procédure formelle de mise en concurrence pour choisir un organisme de formation.", example: "L'État publie un marché public pour former 1000 demandeurs d'emploi." },
            { term: "Approche pédagogique", emoji: "🛤️", def: "La philosophie ou la direction choisie pour transmettre le savoir (active, transmissive...).", example: "Privilégier la pratique et les jeux de rôle plutôt que le cours magistral." },

            { term: "Démarche diagnostique", emoji: "🩺", def: "Analyse préalable pour trouver la cause d'un dysfonctionnement.", example: "Faire un audit pour comprendre pourquoi les ventes baissent." },
            { term: "Demande directe", emoji: "📣", def: "Expression explicite d'un besoin de formation.", example: "Le manager dit : 'Je veux que mon équipe soit formée à Photoshop'." },
            { term: "Demande formelle", emoji: "📧", def: "Demande officielle, structurée et souvent documentée par écrit.", example: "L'envoi d'un cahier des charges via un portail d'appels d'offres." },
            { term: "Demande indirecte", emoji: "🕵️", def: "Besoin non exprimé directement mais détecté par l'analyse.", example: "Constater beaucoup d'erreurs de caisse et en déduire un besoin de formation." },
            { term: "Demande informelle", emoji: "💬", def: "Expression orale ou légère d'un intérêt pour la formation.", example: "Discuter d'une formation Word devant la machine à café." },
            { term: "Développement du leadership", emoji: "👑", def: "Renforcer la capacité à guider et motiver une équipe.", example: "Former les jeunes managers à la gestion de conflit." },
            { term: "Développement professionnel", emoji: "🚀", def: "Évolution continue des compétences pour sa carrière.", example: "Suivre un module sur la gestion de projet pour devenir chef d'équipe." },
            { term: "Devis financier", emoji: "💰", def: "Estimation chiffrée du coût de la formation.", example: "Un devis de 1200€ pour 7 heures de formation individuelle." },
            { term: "Digitalisation", emoji: "🖥️", def: "Transformation des contenus papier en ressources numériques.", example: "Transformer un manuel de 100 pages en 10 vidéos interactives." },
            { term: "Direction (Management)", emoji: "👔", def: "Entité qui valide la stratégie et les investissements formation.", example: "Le Directeur Général qui décide de former tous les cadres." },
            { term: "Disponibilité", emoji: "⏳", def: "Capacité des participants à être présents lors de la formation.", example: "Vérifier que les commerciaux ne sont pas tous en salon le jour du cours." },
            { term: "Distanciel (FOAD)", emoji: "🌐", def: "Formation réalisée à distance via des outils numériques.", example: "Suivre un cours de management en visioconférence sur Teams." },
            { term: "Documents livrables", emoji: "📄", def: "Productions concrètes remises au client (supports, rapports).", example: "Le livret stagiaire et le guide du formateur remis en fin de mission." },
            { term: "Domaine prioritaire", emoji: "🔝", def: "Secteur jugé crucial pour la survie ou la croissance de l'entreprise.", example: "La cybersécurité est devenue la priorité n°1 pour la formation informatique." },
            { term: "DREETS", emoji: "🏛️", def: "Administration régionale contrôlant l'activité de formation.", example: "Déclarer son BPF chaque année à la DREETS pour garder son numéro d'activité." },
            { term: "Écart de compétences", emoji: "📐", def: "Distance entre ce que le salarié sait faire et ce qu'il devrait faire.", example: "Le salarié met 2h pour faire une tâche qui devrait en prendre 30 min." },
            { term: "Échanges informels", emoji: "🗣️", def: "Conversations non structurées permettant de recueillir des infos.", example: "Parler avec les stagiaires pendant la pause déjeuner." },
            { term: "Échéancier", emoji: "📅", def: "Planning des paiements ou des étapes clés du projet.", example: "Payer 30% à la commande et 70% après la réalisation." },
            { term: "Écoute active", emoji: "👂", def: "Posture visant à comprendre le sens profond des mots de l'interlocuteur.", example: "Reformuler ce que dit le manager pour valider son besoin." },
            { term: "Engagement", emoji: "🔥", def: "Niveau d'investissement et de motivation de l'apprenant.", example: "L'apprenant qui pose des questions et fait tous les exercices optionnels." },
            { term: "Enjeux opérationnels", emoji: "⚙️", def: "Besoins liés au fonctionnement quotidien du terrain.", example: "Savoir utiliser le nouveau scanneur pour ne pas bloquer les livraisons." },
            { term: "Enjeux stratégiques", emoji: "🗺️", def: "Besoins liés à la vision globale et au futur de l'entreprise.", example: "Se former à l'export pour ouvrir une filiale aux USA." },
            { term: "Entretien d'explicitation", emoji: "🗣️", def: "Technique pour faire dire précisément 'comment' on fait une tâche.", example: "Demander : 'Qu'est-ce que tu regardes exactement sur l'écran avant de cliquer ?'." },
            { term: "Environnement de travail", emoji: "🏢", def: "Lieu et ambiance dans lesquels l'apprentissage doit s'appliquer.", example: "Former au calme dans une salle pour un travail en open space bruyant." },
            { term: "Équipe de formateurs", emoji: "👥", def: "Ensemble des experts intervenant sur un même projet.", example: "Avoir un expert en droit et un expert en RH pour une formation sociale." },
            { term: "État actuel insatisfaisant", emoji: "📉", def: "La situation de départ qui justifie le besoin de formation.", example: "Il y a 30% d'erreurs sur les factures émises." },
            { term: "État futur souhaité", emoji: "🚀", def: "La situation idéale visée après la formation.", example: "Moins de 2% d'erreurs sur les factures." },
            { term: "Études de cas", emoji: "📖", def: "Mise en situation sur un problème réel ou fictif à résoudre.", example: "Analyser un conflit client réel et proposer une solution de médiation." },
            { term: "Évaluation à chaud", emoji: "🔥", def: "Mesure de la satisfaction immédiate après la formation.", example: "Le questionnaire rempli 5 minutes avant de partir." },
            { term: "Évaluation à froid", emoji: "❄️", def: "Mesure du transfert des acquis sur le poste de travail (plusieurs mois après).", example: "Vérifier 3 mois plus tard si le salarié utilise bien les fonctions Excel apprises." },
            { term: "Évaluation continue", emoji: "📈", def: "Suivi des progrès tout au long du parcours.", example: "Faire un petit quiz de 2 min au début de chaque matinée." },
            { term: "Évaluation des offres", emoji: "⚖️", def: "Analyse comparative des propositions reçues par les prestataires.", example: "Noter chaque prestataire sur son prix, son expérience et son programme." },
            { term: "Évolution technologique", emoji: "💻", def: "Progrès technique obligeant à mettre à jour les compétences.", example: "Apprendre à utiliser ChatGPT pour rédiger des mails plus vite." },
            { term: "Exigence légale", emoji: "⚖️", def: "Obligation de formation imposée par la loi.", example: "La formation à la sécurité incendie obligatoire tous les ans." },
            { term: "Expert métier", emoji: "🧠", def: "Personne qui détient le savoir technique de référence sur le sujet.", example: "Le meilleur mécanicien de l'atelier qui explique les pannes fréquentes." },
            { term: "Expression de besoins", emoji: "📢", def: "Document ou parole qui formalise ce qu'on attend de la formation.", example: "Le mail du chef d'équipe listant les 5 points à aborder absolument." },
            { term: "Feedback", emoji: "💬", def: "Retour d'information donné à l'apprenant ou au formateur.", example: "Dire au stagiaire : 'Ton explication était très claire, continue comme ça'." },
            { term: "Fidélisation", emoji: "🤝", def: "Utiliser la formation pour donner envie aux salariés de rester.", example: "Offrir une formation certifiante pour montrer qu'on croit au salarié." },
            { term: "Finalité stratégique", emoji: "🏁", def: "Le 'pourquoi' lointain de l'action de formation.", example: "La formation vise à réduire le turnover de 15%." },
            { term: "Flexibilité", emoji: "🤸", def: "Capacité à changer de méthode ou de planning au dernier moment.", example: "Reporter une séance car une urgence client mobilise toute l'équipe." },
            { term: "Formation inter-entreprises", emoji: "🏢", def: "Session regroupant des salariés de différentes sociétés.", example: "Un cours d'anglais avec 3 personnes de chez Apple et 2 de chez Google." },
            { term: "Formation intra-entreprise", emoji: "🏠", def: "Session réservée aux salariés d'une seule société.", example: "Une formation management uniquement pour les cadres de l'entreprise X." },
            { term: "Garantie de réussite", emoji: "🛡️", def: "Engagement du prestataire sur l'atteinte des objectifs.", example: "Proposer une heure de coaching bonus si l'examen n'est pas réussi." },
            { term: "Gestion du changement", emoji: "🔄", def: "Accompagner l'humain lors des transitions techniques ou sociales.", example: "Expliquer les bénéfices du nouveau logiciel pour lever les peurs." },
            { term: "Impact de la formation", emoji: "💥", def: "Changement concret observé dans l'entreprise après le stage.", example: "Le chiffre d'affaires du pôle formé a augmenté de 10%." },
            { term: "Indicateur de réussite", emoji: "✅", def: "Donnée chiffrée permettant de dire si l'objectif est atteint.", example: "Le stagiaire doit réussir 80% du test final." },
            { term: "Ingénierie de formation", emoji: "🏗️", def: "Gestion globale du projet (finances, logistique, stratégie).", example: "Monter un dossier de financement OPCO pour un plan de 50 formations." },
            { term: "Ingénierie pédagogique", emoji: "🧩", def: "Conception des méthodes et outils d'apprentissage.", example: "Créer un jeu de plateau pour apprendre les règles de sécurité." },
            { term: "Innovation", emoji: "💡", def: "Intégrer de nouvelles manières d'apprendre (VR, IA, jeux).", example: "Utiliser des casques de réalité virtuelle pour simuler un incendie." },
            { term: "Lieu de formation", emoji: "📍", def: "Endroit physique ou virtuel où se déroule l'apprentissage.", example: "Dans les bureaux du client ou dans un centre spécialisé." },
            { term: "Maquette de formation", emoji: "🏗️", def: "Structure globale du parcours avec les différents modules.", example: "Le plan : Module 1 (Théorie), Module 2 (Pratique), Module 3 (Bilan)." },
            { term: "Mesure quantitative", emoji: "🔢", def: "Évaluation basée sur des chiffres précis.", example: "Réduire le temps de traitement des dossiers de 10 minutes." },
            { term: "Méthodologie pédagogique", emoji: "🛤️", def: "Ensemble des procédés utilisés pour faire apprendre.", example: "La méthode interrogative : faire trouver la solution par les apprenants." },
            { term: "Moyens d'actions", emoji: "⚙️", def: "Outils ou leviers utilisés pour atteindre l'objectif (dont la formation).", example: "La formation + un nouveau guide de procédure papier." },
            { term: "Négociation", emoji: "🤝", def: "Phase de discussion sur le prix ou les modalités du contrat.", example: "Baisser le prix journalier contre une garantie de 10 sessions." },
            { term: "Objectifs organisationnels", emoji: "🎯", def: "Buts que l'entreprise veut atteindre globalement.", example: "Devenir n°1 de la relation client en France." },
            { term: "Objectif pédagogique", emoji: "🏁", def: "Ce que l'apprenant saura faire à la fin du cours.", example: "Être capable de monter un mur en briques de 2 mètres." },
            { term: "OPCO", emoji: "🏦", def: "Organisme qui finance la formation professionnelle des entreprises.", example: "L'OPCO Atlas pour les métiers du conseil et de l'ingénierie." },
            { term: "Performance individuelle", emoji: "📈", def: "Résultat concret du travail d'un seul salarié.", example: "Augmenter son nombre de ventes par mois de 5 à 8." }
        ];

        data.sort((a,b) => a.term.localeCompare(b.term));

        const container = document.getElementById('glossaryContainer');
        const alphabetBox = document.getElementById('alphabetContainer');
        const searchInput = document.getElementById('searchInput');
        const countDisplay = document.getElementById('resultCount');
        const emptyState = document.getElementById('emptyState');

        const msColors = ['ms-blue', 'ms-red', 'ms-yellow', 'ms-green', 'ms-purple'];

        function renderAlphabet() {
            const letters = [...new Set(data.map(i => i.term[0].toUpperCase()))].sort();
            alphabetBox.innerHTML = `<button class="alpha-btn active" onclick="filterByLetter(null, this)">ALL</button>`;
            letters.forEach(l => {
                alphabetBox.innerHTML += `<button class="alpha-btn" onclick="filterByLetter('${l}', this)">${l}</button>`;
            });
        }

        let currentLetter = null;
        function filterByLetter(l, btn) {
            document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentLetter = l; renderCards();
        }

        function renderCards() {
            const term = searchInput.value.toLowerCase();
            container.innerHTML = '';
            const filtered = data.filter(i => {
                const matchSearch = i.term.toLowerCase().includes(term) || i.def.toLowerCase().includes(term);
                const matchLetter = currentLetter ? i.term.startsWith(currentLetter) : true;
                return matchSearch && matchLetter;
            });

            countDisplay.innerText = `${filtered.length} MOTS DÉTECTÉS`;

            if(filtered.length === 0) { emptyState.classList.replace('hidden', 'flex'); }
            else {
                emptyState.classList.replace('flex', 'hidden');
                filtered.forEach((i, idx) => {
                    const color = msColors[idx % msColors.length];
                    const card = document.createElement('div');
                    card.className = `bento-card ${color}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="icon-box">${i.emoji}</div>
                                <h3 class="font-black text-sm md:text-base leading-tight">${i.term}</h3>
                            </div>
                            <button onclick="lireTexte(\`${i.term}\`, \`${i.def.replace(/'/g, "\\'")}\`, \`${i.example.replace(/'/g, "\\'")}\`)" class="dock-btn opacity-60 hover:opacity-100"><i class="fas fa-volume-up"></i></button>
                        </div>
                        <p class="text-[13px] leading-relaxed mb-4 flex-grow opacity-90">${i.def}</p>
                        <div class="mt-auto bg-black/30 border-l-4 border-[var(--accent)] p-2 rounded-r-lg">
                            <p class="text-[10px] text-[var(--accent)] font-bold uppercase mb-0.5">Exemple</p>
                            <p class="text-[12px] italic opacity-80">${i.example}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        window.resetFilters = () => { searchInput.value = ''; filterByLetter(null, document.querySelector('.alpha-btn')); };
        searchInput.addEventListener('input', renderCards);
        renderAlphabet(); renderCards();
    </script>
</body>
</html>
