<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathilde Martine PAISLEY - Hub</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Polices et Icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --python: #be185d;
            --paie: #eab308;
            --strat: #3b82f6;
            --dark: #0f2c48;
            --ivory: #f6f2e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            /* Fond lumineux ivoire/jaune très doux */
            background: linear-gradient(135deg, var(--ivory) 0%, #fef9c3 100%);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* =========================================
           🌟 FONDS ANIMÉS "PÉTILLANTS" (Blobs)
           ========================================= */
        .bg-animated-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.6;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #fef08a; animation-delay: 0s; } /* Jaune pétillant */
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #e0e7ff; animation-delay: -5s; } /* Bleu très doux */
        .blob-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: #fce7f3; animation-delay: -10s; } /* Rose léger */

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* --- La Pluie Magique (Ton Code JS) --- */
        #rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5; /* Devant les blobs, derrière la carte */
            overflow: hidden;
        }

        .rain-item {
            position: absolute;
            top: -50px;
            animation: fall linear infinite;
            filter: drop-shadow(0 4px 6px rgba(15, 44, 72, 0.15)); /* Ombre adaptée au fond clair */
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* --- Carte Glassmorphism Lumineuse --- */
        .business-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 1);
            box-shadow: 0 25px 50px -12px rgba(15, 44, 72, 0.15); /* Ombre bleutée douce */
            z-index: 10;
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Effet rotatif autour de l'avatar */
        .avatar-container {
            position: relative;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--paie), var(--python), var(--strat));
            z-index: -1;
            animation: spinBg 4s linear infinite;
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); /* Halo lumineux jaune */
        }
        @keyframes spinBg {
            100% { transform: rotate(360deg); }
        }

        /* --- Boutons de Contact Lumineux --- */
        .contact-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 1);
            color: var(--dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px rgba(15, 44, 72, 0.05);
        }
        .contact-btn:hover {
            background: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(15, 44, 72, 0.15);
            border-color: #fef08a; /* Bordure jaune au survol */
        }

    </style>
</head>
<body>

    <!-- Blobs d'arrière-plan pétillants -->
    <div class="bg-animated-blob blob-1"></div>
    <div class="bg-animated-blob blob-2"></div>
    <div class="bg-animated-blob blob-3"></div>

    <!-- Conteneur de la pluie magique -->
    <div id="rain-container"></div>

    <!-- Carte de Visite Centrale -->
    <!-- Modification ici : passage à max-w-md pour élargir la carte et tenir l'email sur une ligne -->
    <div class="business-card w-full max-w-md rounded-[2.5rem] p-8 md:p-10 flex flex-col items-center text-center relative overflow-hidden">

        <!-- Avatar -->
        <div class="avatar-container w-36 h-36 rounded-full mb-8 mt-2 shrink-0">
            <img src="https://projettechacademy.github.io/Projet_Python/Asset/Logo_MMPA.jpeg" alt="Mathilde Martine PAISLEY" class="w-full h-full object-cover rounded-full border-[5px] border-white relative z-10" />
        </div>

        <!-- Identité -->
        <h1 class="text-2xl md:text-3xl font-black mb-8 tracking-tight leading-tight text-[#0F2C48]">
            Mathilde Martine<br>PAISLEY
        </h1>

        <!-- Coordonnées directes -->
        <div class="w-full flex flex-col gap-4 mb-2 z-20">

            <!-- Email (forcé sur une seule ligne) -->
            <a href="mailto:mathilde.martine.paisley@gmail.com" class="contact-btn w-full p-4 rounded-2xl font-bold flex items-center gap-3 sm:gap-4 group overflow-hidden">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#0F2C48] to-[#1a4a78] flex items-center justify-center text-white shrink-0 shadow-inner">
                    <span class="text-lg">✉️</span>
                </div>
                <span class="text-xs sm:text-sm md:text-base whitespace-nowrap tracking-tight text-left truncate">mathilde.martine.paisley@gmail.com</span>
            </a>

            <!-- Téléphone -->
            <a href="tel:+33685900887" class="contact-btn w-full p-4 rounded-2xl font-bold flex items-center gap-3 sm:gap-4 group">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FFB900] to-[#eab308] flex items-center justify-center text-white shrink-0 shadow-inner">
                    <span class="text-lg">📞</span>
                </div>
                <span class="text-sm md:text-base tracking-[0.1em] text-left">06 85 90 08 87</span>
            </a>

            <!-- Instagram -->
            <a href="https://instagram.com" target="_blank" class="contact-btn w-full p-4 rounded-2xl font-bold flex items-center gap-3 sm:gap-4 group">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 flex items-center justify-center text-white shrink-0 shadow-inner">
                    <i class="fab fa-instagram text-xl"></i>
                </div>
                <span class="text-sm md:text-base tracking-wide text-left">Instagram</span>
            </a>

        </div>

    </div>

    <!-- Script de la Pluie Magique -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('rain-container');
            const magicItems = [
                { type: 'text', content: '🎓' },
                { type: 'text', content: '💻' },
                { type: 'text', content: '📊' },
                { type: 'text', content: '✨' },
                { type: 'text', content: '🚀' },
                { type: 'text', content: '🧠' },
                { type: 'img', src: 'https://projettechacademy.github.io/Projet_Python/Asset/2127845D-F95D-49C0-A22B-88C07817841B.png' }
            ];

            // Créer 25 éléments tombants
            for (let i = 0; i < 25; i++) {
                const el = document.createElement('div');
                el.classList.add('rain-item');

                const item = magicItems[Math.floor(Math.random() * magicItems.length)];

                if (item.type === 'img') {
                    const img = document.createElement('img');
                    img.src = item.src;
                    const size = Math.random() * 20 + 20;
                    img.style.width = size + 'px';
                    img.style.height = size + 'px';
                    img.style.borderRadius = '50%';
                    img.style.boxShadow = '0 4px 10px rgba(15, 44, 72, 0.2)';
                    el.appendChild(img);
                } else {
                    el.innerText = item.content;
                    el.style.fontSize = (Math.random() * 15 + 15) + 'px';
                }

                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 7 + 8) + 's';
                el.style.animationDelay = (Math.random() * 5) + 's';

                container.appendChild(el);
            }
        });
    </script>
</body>
</html>
