<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathilde Martine PAISLEY - Hub</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Polices et Icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --python: #be185d;
            --paie: #eab308;
            --strat: #3b82f6;
            --dark: #0f2c48;
            --light: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* --- Image de Fond avec Filtre Sombre --- */
        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('https://projettechacademy.github.io/Projet_Python/Asset/Logo_MMPA.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            z-index: 0;
            filter: blur(15px) brightness(0.4);
            transform: scale(1.1); /* Evite les bords blancs dus au flou */
        }

        /* --- La Pluie Magique (Ton Code JS Adapté) --- */
        #rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .rain-item {
            position: absolute;
            top: -50px;
            animation: fall linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* --- Carte Glassmorphism --- */
        .business-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .avatar-container {
            position: relative;
        }
        .avatar-container::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--paie), var(--python), var(--strat));
            z-index: -1;
            animation: spinBg 4s linear infinite;
        }
        @keyframes spinBg {
            100% { transform: rotate(360deg); }
        }

        /* --- Boutons de Contact --- */
        .contact-btn {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.9);
            color: var(--dark);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .contact-btn:hover {
            background: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.3);
        }

    </style>
</head>
<body>

    <!-- Arrière-plan -->
    <div class="bg-image"></div>

    <!-- Conteneur de la pluie magique -->
    <div id="rain-container"></div>

    <!-- Carte de Visite Centrale -->
    <div class="business-card w-full max-w-sm rounded-[2.5rem] p-8 md:p-10 flex flex-col items-center text-center text-white relative">

        <!-- Avatar -->
        <div class="avatar-container w-36 h-36 rounded-full mb-8 mt-2">
            <img src="https://projettechacademy.github.io/Projet_Python/Asset/Logo_MMPA.jpeg" alt="Mathilde Martine PAISLEY" class="w-full h-full object-cover rounded-full border-4 border-white relative z-10" />
        </div>

        <!-- Identité Épurée -->
        <h1 class="text-2xl md:text-3xl font-black mb-8 tracking-tight leading-tight">Mathilde Martine<br>PAISLEY</h1>

        <!-- Coordonnées directes -->
        <div class="w-full flex flex-col gap-4 mb-2">

            <!-- Email -->
            <a href="mailto:mathilde.martine.paisley@gmail.com" class="contact-btn w-full p-4 rounded-2xl font-bold flex items-center gap-4 group">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#0F2C48] to-[#1a4a78] flex items-center justify-center text-white shrink-0 shadow-inner">
                    <span class="text-lg">✉️</span>
                </div>
                <span class="text-xs md:text-sm break-all text-left">mathilde.martine.paisley@gmail.com</span>
            </a>

            <!-- Téléphone -->
            <a href="tel:+33685900887" class="contact-btn w-full p-4 rounded-2xl font-bold flex items-center gap-4 group">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FFB900] to-[#eab308] flex items-center justify-center text-white shrink-0 shadow-inner">
                    <span class="text-lg">📞</span>
                </div>
                <span class="text-sm md:text-base tracking-[0.1em] text-left">06 85 90 08 87</span>
            </a>

        </div>

    </div>

    <!-- Script de la Pluie Magique -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('rain-container');
            const magicItems = [
                { type: 'text', content: '🎓' },
                { type: 'text', content: '💻' },
                { type: 'text', content: '📊' },
                { type: 'text', content: '✨' },
                { type: 'text', content: '🚀' },
                { type: 'text', content: '🧠' },
                { type: 'img', src: 'https://projettechacademy.github.io/Projet_Python/Asset/2127845D-F95D-49C0-A22B-88C07817841B.png' } // Ton logo Paia
            ];

            // Créer 25 éléments tombants
            for (let i = 0; i < 25; i++) {
                const el = document.createElement('div');
                el.classList.add('rain-item');

                const item = magicItems[Math.floor(Math.random() * magicItems.length)];

                if (item.type === 'img') {
                    const img = document.createElement('img');
                    img.src = item.src;
                    const size = Math.random() * 20 + 20; // 20px à 40px
                    img.style.width = size + 'px';
                    img.style.height = size + 'px';
                    img.style.borderRadius = '50%';
                    img.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
                    el.appendChild(img);
                } else {
                    el.innerText = item.content;
                    el.style.fontSize = (Math.random() * 15 + 15) + 'px'; // 15px à 30px
                }

                // Randomisation de la position et de l'animation
                el.style.left = Math.random() * 100 + 'vw';
                el.style.animationDuration = (Math.random() * 7 + 8) + 's'; // 8s à 15s
                el.style.animationDelay = (Math.random() * 5) + 's'; // Décalage pour ne pas tout faire tomber d'un coup

                container.appendChild(el);
            }
        });
    </script>
</body>
</html>
