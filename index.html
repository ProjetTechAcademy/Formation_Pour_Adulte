          { id: "M02", nom: "M02" },
          { id: "M03", nom: "M03" },
          { id: "M04", nom: "M04" },
          { id: "M05", nom: "M05" },
        ],
      };

      // ==========================================
      // ⚙️ LOGIQUE & ÉTAT
      // ==========================================
      let progressRes = JSON.parse(localStorage.getItem("paia_p_v10")) || {};
      let isVoice = localStorage.getItem("paia_voice") === "true";
      let currentBloc = "ALL";
      let currentMod = "ALL";

      function extraire(item) {
        let p = item.split(" - ");
        return {
          id: p[0].trim(),
          titre: p.slice(1).join(" - "),
        };
      }

      function toggleAudio() {
        isVoice = !isVoice;
        localStorage.setItem("paia_voice", isVoice);
        document.getElementById("audioBtn").innerText = isVoice
          ? "Audio : ON"
          : "Audio : OFF";
      }

      function lire(txt) {
        if (!isVoice) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = "fr-FR";
        window.speechSynthesis.speak(u);
      }

      function filtrerBloc(bloc) {
        currentBloc = bloc;
        currentMod = "ALL";
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.getElementById("tab-" + bloc)?.classList.add("active");
        renderSubTabs();
        afficherModules(
          document.getElementById("searchInput")
            ? document.getElementById("searchInput").value
            : "",
        );
      }

      function renderSubTabs() {
        const sub = document.getElementById("subTabsContainer");
        sub.innerHTML = "";
        if (currentBloc === "ALL") {
          sub.classList.add("hidden");
          return;
        }
        sub.classList.remove("hidden");
        const mods = configStructure[currentBloc] || [];
        const allBtn = document.createElement("button");
        allBtn.className = `tab-btn text-[10px] ${currentMod === "ALL" ? "active" : ""} px-4 py-2 font-bold rounded shadow-sm border mb-2`;
        allBtn.innerText = "TOUT " + currentBloc;
        allBtn.onclick = () => {
          currentMod = "ALL";
          renderSubTabs();
          afficherModules("");
        };
        sub.appendChild(allBtn);
        mods.forEach((m) => {
          const btn = document.createElement("button");
          btn.className = `tab-btn text-[10px] ${currentMod === m.id ? "active" : ""} px-4 py-2 font-bold rounded shadow-sm border ml-2 mb-2`;
          btn.innerText = m.id;
          btn.onclick = () => {
            currentMod = m.id;
            renderSubTabs();
            afficherModules("");
          };
          sub.appendChild(btn);
        });
      }

      window.toggleRes = function (id, rid) {
        const key = `${id}-${rid}`;
        progressRes[key] = !progressRes[key];
        localStorage.setItem("paia_p_v10", JSON.stringify(progressRes));
        if (progressRes[key])
          confetti({ particleCount: 30, spread: 50, origin: { y: 0.9 } });
        afficherModules(document.getElementById("searchInput").value, false);
      };

      window.toggleLine = function (id) {
        const rids = [
          "audio",
          "pdf",
          "lien",
          "excel",
          "infog",
          "slide",
          "video",
          "glo",
          "map",
          "quiz",
        ];
        const keys = rids.map((rid) => `${id}-${rid}`);
        const isAll = keys.every((k) => progressRes[k]);
        keys.forEach((k) => (progressRes[k] = !isAll));
        localStorage.setItem("paia_p_v10", JSON.stringify(progressRes));
        if (!isAll) {
          confetti({ particleCount: 150 });
          afficherToast("Ligne Validée ! ✅");
        }
        afficherModules(document.getElementById("searchInput").value, false);
      };

      function afficherModules(filtre = "", anim = true) {
        const list = document.getElementById("listContainer");
        if (!list) return;
        list.innerHTML = "";
        let vueCount = 0,
          totalCount = 0,
          cardIdx = 0;

        database.forEach((item) => {
          const { id, titre } = extraire(item);
          if (!item.toLowerCase().includes(filtre.toLowerCase())) return;
          if (currentBloc !== "ALL" && !id.includes(`_${currentBloc}_`)) return;
          if (
            currentMod !== "ALL" &&
            !id.includes(`${currentBloc}_${currentMod}`)
          )
            return;

          const res = [
            { id: "audio", em: "🎧", n: "Audio", b: "bg-audio" },
            { id: "pdf", em: "📄", n: "PDF", b: "bg-pdf" },
            { id: "lien", em: "🎓", n: "Lien Studi", b: "bg-lien" },
            { id: "excel", em: "📊", n: "Excel", b: "bg-excel" },
            { id: "infog", em: "🖼️", n: "Infographie", b: "bg-infog" },
            { id: "slide", em: "📽️", n: "Slide", b: "bg-slide" },
            { id: "video", em: "🎬", n: "Vidéo", b: "bg-video" },
            {
              id: "glo",
              em: "📚",
              n: "Lexique",
              b: "bg-glo",
              p: `Glossaire/${encodeURIComponent(item)}.html`,
            },
            {
              id: "map",
              em: "🧠",
              n: "Carte",
              b: "bg-map",
              p: `Carte Mentale/${encodeURIComponent(item)}.html`,
            },
            {
              id: "quiz",
              em: "⚡",
              n: "Quiz",
              b: "bg-quiz",
              p: `Quiz/${encodeURIComponent(item)}.html`,
            },
          ];

          let lineChecked = 0;
          const htmlRes = res
            .map((r) => {
              totalCount++;
              const isV = progressRes[`${id}-${r.id}`];
              if (isV) {
                vueCount++;
                lineChecked++;
              }
              const checkC = isV
                ? "bg-green-500 text-white"
                : "bg-white text-gray-200";

              let tag = "a";
              let action = "";

              if (r.p) {
                action = `href="${r.p}" target="_blank"`;
              } else if (r.id === "pdf" && typeof LIENS_PDF !== 'undefined' && LIENS_PDF[id]) {
                action = `href="${LIENS_PDF[id]}" target="_blank"`;
              } else if (r.id === "lien" && typeof LIENS_LIEN !== 'undefined' && LIENS_LIEN[id]) {
                if (LIENS_LIEN[id].startsWith("http")) {
                    action = `href="${LIENS_LIEN[id]}" target="_blank"`;
                } else {
                    tag = "div";
                    action = `onclick="afficherTravaux('${(titre || "").replace(/'/g, "\\'")}')" style="cursor:pointer;"`;
                }
              } else {
                tag = "div";
                action = `onclick="afficherTravaux('${(titre || "").replace(/'/g, "\\'")}')" style="cursor:pointer;"`;
              }

              return `<div class="relative tooltip-container">
                        <${tag} ${action} class="btn-resource ${r.b}" onmouseenter="lire('${r.n}')"><span>${r.em}</span></${tag}>
                        <button onclick="toggleRes('${id}','${r.id}')" class="check-badge ${checkC}"><i class="fas fa-check"></i></button>
                        <span class="tooltip">${r.n}</span>
                    </div>`;
            })
            .join("");

          const isFull = lineChecked === res.length;
          const card = document.createElement("div");
          card.className = `flex flex-col md:flex-row gap-4 p-5 bg-white border border-[#0F2C48]/10 rounded-xl shadow-sm mb-4 ${anim ? "card-animate" : ""} ${isFull ? "bg-green-50" : ""}`;
          if (anim) card.style.animationDelay = `${cardIdx * 0.04}s`;

          card.innerHTML = `<div class="flex-grow">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="text-black font-black text-2xl pr-2">${id.split("_")[0]}</span>
                        <h3 class="font-bold text-lg text-[#0F2C48] leading-tight">${titre}</h3>
                    </div>
                    <p class="text-[9px] text-[#B4792A] font-code uppercase mb-4 tracking-tighter opacity-70">${id}</p>
                    <div class="flex flex-wrap gap-3">${htmlRes}</div>
                </div>
                <div class="flex flex-col items-center justify-center min-w-[150px] border-t md:border-t-0 md:border-l pt-4 md:pt-0 md:pl-4 border-gray-100">
                    <button onclick="toggleLine('${id}')" class="btn-to-validate btn-valider-3d px-6 py-3 rounded-xl text-xs w-full ${isFull ? "btn-success-line" : ""}">
                         ${isFull ? "Terminé ✅" : "Valider"}
                    </button>
                </div>`;
          list.appendChild(card);
          cardIdx++;
        });

        const gP =
          totalCount === 0 ? 0 : Math.round((vueCount / totalCount) * 100);
        document.getElementById("progressBar").style.width = gP + "%";
        document.getElementById("progressText").innerText = gP + "%";
        document.getElementById("compteurResVue").innerText = vueCount;
        document.getElementById("compteurResTotal").innerText = totalCount;
      }

      function afficherToast(m) {
        const c = document.getElementById("toastContainer");
        const t = document.createElement("div");
        t.className =
          "toast-notification show p-3 bg-white border-l-4 border-green-500 shadow-lg rounded-lg flex items-center gap-3 pointer-events-auto";
        t.innerHTML = `<span class="text-xl">✨</span><span class="text-[#0F2C48] font-bold text-sm">${m}</span>`;
        c.appendChild(t);
        setTimeout(() => {
          t.remove();
        }, 3000);
      }

      function afficherTravaux(n) {
        document.getElementById("modalTxt").innerText = n;
        document.getElementById("modalTravaux").style.display = "flex";
      }

      const sE = document.getElementById("searchInput");
      if (sE)
        sE.addEventListener("input", (e) => afficherModules(e.target.value));

      filtrerBloc("ALL");
    </script>
  </body>
</html>
